<!doctype html>
<html lang="vi">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Xác nhận đã đổ rác</title>
    <style>
        :root {
            color-scheme: light;
            font-family: Arial, Helvetica, sans-serif;
            background: #fef7ff;
            color: #1d1b20;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .card {
            width: min(520px, 100%);
            background: #ffffff;
            border: 1px solid #e7e0ec;
            border-radius: 24px;
            box-shadow: 0 16px 40px rgba(29, 27, 32, 0.12);
            padding: 28px;
            text-align: center;
        }

        .icon {
            font-size: 56px;
            line-height: 1;
            margin-bottom: 14px;
        }

        h1 {
            margin: 0 0 12px;
            font-size: 24px;
            color: #1d1b20;
        }

        p {
            margin: 8px 0;
            color: #49454f;
            line-height: 1.55;
            font-size: 15px;
        }

        .status {
            margin-top: 18px;
            padding: 14px;
            border-radius: 16px;
            font-weight: 700;
            line-height: 1.45;
        }

        .loading {
            background: #e8f0fe;
            color: #174ea6;
        }

        .success {
            background: #e6f4ea;
            color: #137333;
        }

        .error {
            background: #fce8e6;
            color: #b3261e;
        }

        .muted {
            margin-top: 18px;
            font-size: 12px;
            color: #79747e;
        }
    </style>
</head>

<body>
    <main class="card">
        <div class="icon" id="icon">🗑️</div>
        <h1>Xác nhận đã đổ rác</h1>
        <p id="description">Đang kiểm tra thông tin xác nhận...</p>
        <div id="status" class="status loading">Vui lòng chờ trong giây lát.</div>
        <p class="muted">Dorm Trash Guard • Link chỉ hợp lệ với đúng thành viên đang tới lượt.</p>
    </main>

    <script>
        const statusEl = document.getElementById('status');
        const descriptionEl = document.getElementById('description');
        const iconEl = document.getElementById('icon');

        function setStatus(type, message, description, icon) {
            statusEl.className = `status ${type}`;
            statusEl.textContent = message;
            if (description) descriptionEl.textContent = description;
            if (icon) iconEl.textContent = icon;
        }

        function sanitizeRoomName(roomName) {
            return roomName.replace(/[^a-zA-Z0-9]/g, '').toLowerCase();
        }

        function normalizeEmail(email) {
            return email.trim().toLowerCase();
        }

        function buildFirebaseUrl(baseUrl, path, apiKey) {
            const cleanBase = baseUrl.trim().replace(/\/+$/, '');
            const cleanPath = path.replace(/^\/+/, '');
            const auth = apiKey ? `?auth=${encodeURIComponent(apiKey)}` : '';
            return `${cleanBase}/${cleanPath}${auth}`;
        }

        function findNextAvailableTurnIndex(members, startIndex) {
            if (!Array.isArray(members) || members.length === 0) return -1;
            for (let offset = 0; offset < members.length; offset++) {
                const index = ((startIndex + offset) % members.length + members.length) % members.length;
                if (!members[index]?.isAbsent) return index;
            }
            return ((startIndex % members.length) + members.length) % members.length;
        }

        async function confirmTrashDumped() {
            const params = new URLSearchParams(window.location.search);
            const roomName = params.get('roomName') || '';
            const email = normalizeEmail(params.get('email') || '');
            const name = (params.get('name') || '').trim();
            const token = (params.get('token') || '').trim();
            const firebaseDbUrl = params.get('firebaseDbUrl') || '';
            const firebaseApiKey = params.get('firebaseApiKey') || '';

            if (!roomName || !email || !name || !token || !firebaseDbUrl) {
                setStatus(
                    'error',
                    'Link xác nhận thiếu thông tin, không thể xử lý.',
                    'Vui lòng mở app Dorm Trash Guard để xác nhận thủ công.',
                    '⚠️'
                );
                return;
            }

            const stateUrl = buildFirebaseUrl(firebaseDbUrl, 'state.json', firebaseApiKey);
            const stateResponse = await fetch(stateUrl, { method: 'GET' });
            if (!stateResponse.ok) {
                throw new Error(`Không đọc được dữ liệu Firebase (${stateResponse.status}).`);
            }

            const state = await stateResponse.json();
            if (!state) {
                setStatus('error', 'Không tìm thấy trạng thái phòng.', 'Vui lòng đồng bộ Firebase trong app rồi thử lại.', '⚠️');
                return;
            }

            const members = Array.isArray(state.members) ? state.members : [];
            if (members.length === 0) {
                setStatus('error', 'Không tìm thấy danh sách thành viên.', 'Vui lòng kiểm tra cấu hình phòng trong app.', '⚠️');
                return;
            }

            if (!state.isTrashFull) {
                setStatus('success', 'Rác đã được xác nhận đổ trước đó.', 'Không cần xác nhận lại.', '✅');
                return;
            }

            const safeCurrentIndex = ((Number(state.currentTurnIndex || 0) % members.length) + members.length) % members.length;
            const activeIndex = findNextAvailableTurnIndex(members, safeCurrentIndex);
            const activeMember = members[activeIndex];
            const activeEmail = normalizeEmail(activeMember?.email || '');
            const activeName = (activeMember?.name || '').trim();
            const expectedEmail = normalizeEmail(state.confirmEmail || activeEmail);

            if (state.confirmToken !== token) {
                setStatus('error', 'Mã xác nhận không hợp lệ hoặc đã hết hạn.', 'Chỉ email mới nhất được gửi cho đúng lượt hiện tại mới xác nhận được.', '⛔');
                return;
            }

            if (expectedEmail !== email || activeEmail !== email || activeName !== name) {
                setStatus(
                    'error',
                    'Bạn không phải thành viên đang tới lượt đổ rác.',
                    'Link này chỉ cho phép đúng người nhận email và đang tới lượt xác nhận.',
                    '⛔'
                );
                return;
            }

            const nextIndex = findNextAvailableTurnIndex(members, activeIndex + 1);
            const updatedState = {
                ...state,
                currentTurnIndex: nextIndex >= 0 ? nextIndex : activeIndex,
                isTrashFull: false,
                reportedByName: '',
                reportedAt: 0,
                confirmToken: '',
                confirmEmail: ''
            };

            const updateResponse = await fetch(stateUrl, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json; charset=utf-8' },
                body: JSON.stringify(updatedState)
            });

            if (!updateResponse.ok) {
                throw new Error(`Không cập nhật được Firebase (${updateResponse.status}).`);
            }

            setStatus(
                'success',
                `Cám ơn ${name}! Đã xác nhận bạn đã đổ rác.`,
                'Lượt đổ rác đã được chuyển sang thành viên tiếp theo.',
                '✅'
            );
        }

        confirmTrashDumped().catch((error) => {
            console.error(error);
            setStatus(
                'error',
                error.message || 'Có lỗi xảy ra khi xác nhận.',
                'Vui lòng thử lại hoặc mở app Dorm Trash Guard để xác nhận thủ công.',
                '⚠️'
            );
        });
    </script>
</body>

</html>
